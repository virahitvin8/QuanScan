name: Build Android APK & Release

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  build-android:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Install Dependencies & Build Frontend
        run: |
          cd frontend
          npm install
          npm run build
          npx cap sync android

      - name: Build Android APK
        run: |
          cd frontend/android
          echo "Accepting Android SDK licenses..."
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses || true
          chmod +x gradlew
          echo "Starting Gradle Build..."
          ./gradlew assembleDebug --stacktrace > gradle-build.log 2>&1 || (cat gradle-build.log && exit 1)
          
          APK_PATH=$(find app/build/outputs/apk/debug/ -name "*.apk" | head -n 1)
          if [ -n "$APK_PATH" ]; then
            mv "$APK_PATH" app/build/outputs/apk/debug/quanscan.apk
          else
            echo "Error: No APK was generated!"
            exit 1
          fi

      - name: Upload Build Log
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: gradle-build-log
          path: frontend/android/gradle-build.log

      - name: Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: quanscan.apk
          path: frontend/android/app/build/outputs/apk/debug/quanscan.apk

      - name: Create GitHub Release
        id: create_release
        uses: softprops/action-gh-release@v2
        with:
          name: Quan Scan App Release
          tag_name: "latest-build-${{ github.run_number }}"
          files: frontend/android/app/build/outputs/apk/debug/quanscan.apk
          make_latest: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
